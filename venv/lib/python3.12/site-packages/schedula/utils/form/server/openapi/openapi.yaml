openapi: 3.0.3
info:
  title: Schedula API
  version: 1.0.0
  description: OpenAPI spec generated from the Flask server code. Some endpoints
    are enabled only when the related feature flags are on.
servers:
  - url: /
tags:
  - name: OpenAPI
    description: API documentation endpoints and OpenAPI schema resources.
  - name: Security
    description: Authentication, account, and user settings operations.
  - name: Groups
    description: Group management and memberships APIs.
  - name: Casbin
    description: Administrative Casbin policy and grouping APIs.
  - name: Items
    description: Item CRUD operations by category.
  - name: Item ACL
    description: Item sharing and publish/unpublish access control APIs.
  - name: Item Files
    description: Download and access item-related file resources.
  - name: Item Schemas
    description: Administrative item schema versioning and publication APIs.
  - name: Export
    description: Form export endpoints and generated outputs.
  - name: Stripe
    description: Billing, balances, subscriptions, and Stripe webhooks.
  - name: GDPR
    description: GDPR consent and policy file endpoints.
  - name: Contact
    description: Contact form and mail dispatch endpoint.
  - name: Locales
    description: Localization dictionaries and language resources.
  - name: Files
    description: Generic file upload and retrieval endpoints.
  - name: Notifications
    description: Notification delivery, tokens, watchers, and reads.
  - name: Templates
    description: Notification template administration and testing APIs.
  - name: Contracts
    description: Contract template, lifecycle, and event APIs.
  - name: APIs
    description: API templates and ephemeral API-triggered workflow execution.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
    authToken:
      type: apiKey
      in: header
      name: Authentication-Token
    ApiSecret:
      type: apiKey
      in: header
      name: X-Notif-Secret
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    Status:
      type: object
      properties:
        status:
          type: string
    StripeCheckoutSessionResponse:
      type: object
      properties:
        clientSecret:
          type: string
          nullable: true
        sessionId:
          type: string
    StripeCheckoutLineItemsPayload:
      oneOf:
        - type: array
          items:
            type: object
            additionalProperties: true
        - type: object
          patternProperties:
            "^\\d+$":
              type: object
              additionalProperties: true
          additionalProperties: false
    StripeSessionStatusResponse:
      type: object
      properties:
        status:
          type: string
        customer_email:
          type: string
          nullable: true
        userInfo:
          type: object
          additionalProperties: true
    StripeBalanceWallet:
      type: object
      properties:
        name:
          type: string
        balance:
          type: object
          additionalProperties: true
        main:
          type: boolean
    StripeBalanceResponse:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/StripeBalanceWallet'
    StripeSubscriptionResponse:
      type: object
      additionalProperties: true
    StripePortalSessionResponse:
      type: object
      properties:
        session_url:
          type: string
        error:
          type: string
          nullable: true
    StripePricingTableSessionResponse:
      type: object
      properties:
        clientSecret:
          type: string
        error:
          type: string
          nullable: true
    StripeWebhookResponse:
      type: object
      properties:
        success:
          type: boolean
    StripeCheckoutSessionStorageUpsertRequest:
      type: object
      required:
        - payload_schema
        - session_kw
        - line_items
      properties:
        payload_schema:
          type: object
          additionalProperties: true
        session_kw:
          type: object
          required:
            - mode
          properties:
            mode:
              type: string
              enum:
                - payment
                - subscription
          additionalProperties: true
        line_items:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        enabled:
          type: boolean
      additionalProperties: false
    StripeCheckoutSessionStorageItem:
      type: object
      properties:
        _id:
          type: string
        payload_schema:
          type: object
          additionalProperties: true
        session_kw:
          type: object
          additionalProperties: true
        line_items:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        enabled:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string
        created_by:
          type: string
          nullable: true
        updated_by:
          type: string
          nullable: true
    StripeCheckoutSessionStorageListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/StripeCheckoutSessionStorageItem'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        next_offset:
          type: integer
          nullable: true
    StripeCheckoutSessionStorageGetResponse:
      type: object
      properties:
        id:
          type: string
        checkout_session:
          $ref: '#/components/schemas/StripeCheckoutSessionStorageItem'
    StripeCheckoutSessionStorageMutationResponse:
      type: object
      properties:
        ok:
          type: boolean
        checkout:
          type: string
    NotificationCreateRequest:
      type: object
      required: [ event, targets, payload ]
      properties:
        event:
          type: string
          example: report.ready
        actor:
          type: string
          example: u:1
        targets:
          type: object
          description: >
            Map of target principals to channel list. Example:
            {"u:2": ["in_app"], "u:3": ["mail"]}
          additionalProperties:
            type: array
            items:
              type: string
          example:
            u:2: [ "mail" ]
            u:3: [ "push" ]
        severity:
          type: string
          enum: [ info, warning, error, critical ]
          default: info
        sender_user_id:
          type: integer
          nullable: true
        sender_principal:
          type: string
          nullable: true
        sender_is_system:
          type: boolean
          default: false
        persist:
          description: >
            Persistence policy. true=store, false=ephemeral (still delivered),
            auto=store only when needed.
          oneOf:
            - type: boolean
            - type: string
              enum: [ auto ]
          default: auto
        payload:
          type: object
          additionalProperties: true
          example:
            title: Report ready
            message: ACME Q4 report is ready
            url: https://example.com/reports/abc
            data:
              report_id: abc
    NotificationCreateResponse:
      type: object
      properties:
        id:
          type: string
    NotificationListResponse:
      type: object
      properties:
        notifications:
          type: array
          items:
            type: object
            additionalProperties: true
        total:
          type: integer
        next_offset:
          type: integer
          nullable: true
    UnreadCountResponse:
      type: object
      properties:
        unread:
          type: integer
          example: 3
    NotificationMarkReadRequest:
      type: object
      required:
        - notification_ids
      properties:
        notification_ids:
          type: array
          items:
            type: string
          minItems: 1
    TemplateUpsertRequest:
      type: object
      properties:
        id:
          type: string
        event:
          type: string
        scope:
          type: object
          properties:
            category:
              type: string
            event:
              type: string
            dom:
              type: string
        channel:
          type: string
        enabled:
          type: boolean
          default: true
        title:
          type: string
        body:
          type: string
        channel_overrides:
          type: object
          additionalProperties: true
    NotificationTemplateTestRequest:
      type: object
      properties:
        event:
          type: string
          description: Base event name used in event_format.
          example: update
        event_format:
          type: string
          description: >
            Python format string for event names. Supports {category} and {event}.
          default: item.{category}.{event}
        categories:
          type: array
          items:
            type: string
          description: Optional explicit categories to render.
        dom:
          type: string
          description: Optional dom scope for channel rules.
        channels:
          type: array
          items:
            type: string
          description: Optional channel list to test (filtered by rules).
        preferences:
          type: object
          additionalProperties:
            type: boolean
          description: Optional channel preferences map.
        principal:
          type: string
          description: Viewer principal used for rendering.
        sender_principal:
          type: string
          description: Sender principal used for ref ACL checks.
        severity:
          type: string
          enum: [ info, warning, error, critical ]
        payload:
          type: object
          additionalProperties: true
    NotificationTemplateTestResponse:
      type: object
      properties:
        event:
          type: string
        event_format:
          type: string
        categories:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              event:
                type: string
              allowed_channels:
                type: array
                items:
                  type: string
              mandatory_channels:
                type: array
                items:
                  type: string
              enabled_channels:
                type: array
                items:
                  type: string
              rendered:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    title:
                      type: string
                    body:
                      type: string
    WatcherRequest:
      type: object
      properties:
        event:
          type: string
          example: update
        category:
          type: string
          example: note
        object_id:
          type: string
          example: '*'
        dom:
          type: string
          example: 'acl:group:123'
        channels:
          type: array
          items:
            type: string
        enabled:
          type: boolean
          default: true
    WatcherListResponse:
      type: object
      properties:
        watchers:
          type: array
          items:
            type: object
            additionalProperties: true
    NotificationRuleInput:
      type: object
      properties:
        scope:
          type: object
          properties:
            category:
              type: string
            dom:
              type: string
        defaults:
          type: array
          items:
            type: string
        mandatory:
          type: array
          items:
            type: string
        allowed:
          type: array
          items:
            type: string
        enabled:
          type: boolean
          default: true
    NotificationRule:
      allOf:
        - $ref: '#/components/schemas/NotificationRuleInput'
        - type: object
          properties:
            id:
              type: string
    Item:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
        acl_dom:
          type: string
        grants_ref:
          type: string
          nullable: true
        created_by:
          type: string
        updated_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true
        files:
          type: object
          additionalProperties: true
    ItemCreate:
      type: object
      properties:
        acl_dom:
          type: string
          description: Dominio ACL esplicito (workspace).
        group_id:
          type: string
          description: Se presente, acl_dom viene derivato dal gruppo (acl_group).
        data:
          type: object
          additionalProperties: true
    ItemUpdate:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
    ItemListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        next_offset:
          type: integer
          nullable: true
    ShareEntry:
      type: object
      required:
        - target
        - actions
      properties:
        target:
          type: string
          description: 'Principal target, es: u:2, g:123, g:123:admin'
        actions:
          type: array
          items:
            type: string
            enum:
              - read
              - write
              - manage
    ShareReplacePayload:
      type: object
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ShareEntry'
    ShareListResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ShareEntry'
    ItemSchemaDoc:
      type: object
      properties:
        category:
          type: string
        version:
          type: string
          description: SemVer string (x.y.z)
        status:
          type: string
          enum:
            - draft
            - published
        is_enabled:
          type: boolean
        is_placeholder:
          type: boolean
        note:
          type: string
          nullable: true
        schema:
          type: object
          additionalProperties: true
          description: Mongo $jsonSchema fragment for the item data field
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        published_at:
          type: string
          format: date-time
          nullable: true
    ItemSchemaCategory:
      type: object
      properties:
        category:
          type: string
        max_version:
          type: string
        published_enabled_versions:
          type: array
          items:
            type: string
    ItemSchemaCategoryListResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/ItemSchemaCategory'
    ItemSchemaCategoryDetailResponse:
      type: object
      properties:
        category:
          type: string
        versions:
          type: array
          items:
            $ref: '#/components/schemas/ItemSchemaDoc'
    ItemSchemaDraftCreate:
      type: object
      required:
        - version
        - schema
      properties:
        version:
          type: string
          description: SemVer string (x.y.z)
        schema:
          type: object
          additionalProperties: true
        note:
          type: string
          nullable: true
    ItemSchemaDraftUpdate:
      type: object
      properties:
        schema:
          type: object
          additionalProperties: true
        note:
          type: string
          nullable: true
    ItemSchemaStatusResponse:
      type: object
      properties:
        ok:
          type: boolean
        category:
          type: string
        version:
          type: string
        status:
          type: string
        is_enabled:
          type: boolean
    ContractTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        definition:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        is_enabled:
          type: boolean
        allowed_subjects:
          type: array
          items:
            type: string
        allowed_initial_states:
          type: array
          items:
            type: string
        created_at:
          type: string
        updated_at:
          type: string
    ContractTemplateListResponse:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: '#/components/schemas/ContractTemplate'
    ContractTemplateCreateRequest:
      type: object
      required:
        - name
        - definition
      properties:
        name:
          type: string
        description:
          type: string
        definition:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        is_enabled:
          type: boolean
        allowed_subjects:
          type: array
          items:
            type: string
        allowed_initial_states:
          type: array
          items:
            type: string
      additionalProperties: true
    ContractCreateRequest:
      type: object
      properties:
        context:
          type: object
          additionalProperties: true
        initial_state:
          type: string
      additionalProperties: false
    ContractDocument:
      type: object
      properties:
        id:
          type: string
        state:
          type: string
          nullable: true
        status:
          type: string
        user_state:
          type: string
          nullable: true
        created_at:
          type: string
          nullable: true
        updated_at:
          type: string
          nullable: true
      additionalProperties: true
    ContractEventRequest:
      type: object
      properties:
        payload:
          type: object
          additionalProperties: true
      additionalProperties: false
    ContractEventResponse:
      type: object
      additionalProperties: true
    ApiTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        definition:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        is_enabled:
          type: boolean
        created_at:
          type: string
          nullable: true
        updated_at:
          type: string
          nullable: true
      additionalProperties: true
    ApiTemplateListResponse:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: '#/components/schemas/ApiTemplate'
    ApiTemplateCreateRequest:
      type: object
      required:
        - name
        - definition
      properties:
        name:
          type: string
        description:
          type: string
        definition:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        is_enabled:
          type: boolean
      additionalProperties: true
security:
  - bearerAuth: [ ]
  - cookieAuth: [ ]
  - authToken: [ ]
paths:
  /docs:
    get:
      operationId: get_docs
      tags:
        - OpenAPI
      summary: Swagger UI
      description: >
        Serves the interactive Swagger UI for this API. This is a public
        endpoint intended for exploration and manual testing. The response
        is an HTML document.
      responses:
        '200':
          description: OK
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security: [ ]
  /openapi.json:
    get:
      operationId: get_openapi_json
      tags:
        - OpenAPI
      summary: OpenAPI JSON
      description: >
        Returns the OpenAPI document in JSON format. This endpoint is public
        and intended for tooling, SDK generation, and contract checks. The
        payload is the full API schema.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security: [ ]
  /openapi.yaml:
    get:
      operationId: get_openapi_yaml
      tags:
        - OpenAPI
      summary: OpenAPI YAML
      description: >
        Returns the OpenAPI document in YAML format. This endpoint is public
        and intended for documentation tooling. The response is a YAML string.
      responses:
        '200':
          description: OK
          content:
            application/yaml:
              schema:
                type: string
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security: [ ]
  /user/login:
    post:
      operationId: post_user_login
      tags:
        - Security
      summary: Login (Flask-Security)
      description: >
        Authenticates a user by email and password via Flask-Security. On success
        it returns a user payload and an authentication token. This endpoint is
        public and does not require prior authentication.
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                remember:
                  type: boolean
              required:
                - email
                - password
      security: [ ]
  /user/logout:
    post:
      operationId: post_user_logout
      tags:
        - Security
      summary: Logout (Flask-Security)
      description: >
        Logs out the current user session or token. This endpoint requires
        authentication and invalidates the active credentials. It returns a
        generic status payload.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /user/register:
    post:
      operationId: post_user_register
      tags:
        - Security
      summary: Register (Flask-Security)
      description: >
        Creates a new user account using Flask-Security. Email confirmation may
        be required depending on configuration. Returns a registration status
        and user payload on success.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      security: [ ]
  /user/confirm/{token}:
    get:
      operationId: get_user_confirm_by_token
      tags:
        - Security
      summary: Confirm email (Flask-Security)
      description: >
        Confirms a user account using a confirmation token. The token is typically
        delivered via email. Returns a status payload indicating the outcome.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
