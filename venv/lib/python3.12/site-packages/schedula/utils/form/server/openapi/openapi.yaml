  /contracts:
    get:
      operationId: get_contracts
      tags:
        - Contracts
      summary: List contracts for current user
      description: >
        Returns paginated contracts where the authenticated user is present in
        contract states. Supports mq filtering, sort and pagination.
      parameters:
        - name: sort
          in: query
          required: false
          schema:
            type: string
            description: 'Allowed fields: _id, created_at, updated_at, state, status. Prefix with - for descending.'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
        - name: mq
          in: query
          required: false
          schema:
            type: string
          description: JSON Mongo-like query merged with enforced user visibility filter (states.<current_user> exists).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContractDocument'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
                  next_offset:
                    type: integer
                    nullable: true
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
