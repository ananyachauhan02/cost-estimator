          required: false
          schema:
            type: string
            enum:
              - read
              - write
        - name: group_id
          in: query
          required: false
          schema:
            type: string
        - &id009
          name: include_data
          in: query
          required: false
          schema:
            type: string
          description: Se true/1/yes/... include anche data+files; altrimenti metadata-only.
        - &id012
          name: mq
          in: query
          required: false
